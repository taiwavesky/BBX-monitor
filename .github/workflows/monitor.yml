name: Beyblade Stock Monitor

on:
  schedule:
    # 私人 repo 建議 15 分鐘(慳分鐘數);公開 repo 至好用返 '*/5 * * * *'
    - cron: '*/15 * * * *'
  workflow_dispatch:        # 允許網頁手動觸發

# 同一時間只准跑一個 run,避免兩個 run 爭住 push state 撞車
concurrency:
  group: stock-monitor
  cancel-in-progress: false

permissions:
  contents: write           # commit seen_products.json 返 repo 要用

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monitor script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: python Github_Hobbyland_beyblade_telegrambot_v5.py

      # 🔴 最關鍵嗰步:把更新後嘅 state commit 返入 repo
      #    冇咗呢步,每次都當「第一次運行」,永遠唔會出通知!
      - name: Persist state (commit seen_products.json)
        run: |
          if [[ -n "$(git status --porcelain seen_products.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_products.json
            git commit -m "chore: update seen_products.json [skip ci]"
            git push
          else
            echo "state 冇變化,唔使 commit"
          fi
