name: Beyblade Stock Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分鐘自動執行一次 (24小時不間斷)
  workflow_dispatch:       # 允許你在 GitHub 網頁上手動點擊按鈕即時執行

permissions:
  contents: write          # 允許 GitHub 把更新後的 seen_products.json 寫回你的 Repository

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monitor script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: python Github_Hobbyland_beyblade_telegrambot_v5.py  # 已自動為你修改為 v5 檔名
