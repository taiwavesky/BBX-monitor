name: Github_HBL_Toys_beyblade_telegram_Monitor

on:
  # ✅ 由 cron-jobs.org 經 GitHub API 觸發（必須要有 workflow_dispatch）
  workflow_dispatch:

  # 🔁 GitHub 內置排程（後備）。注意：cron-jobs.org + schedule 會「雙重觸發」
  #     ＝用多一倍 Actions 分鐘。想用後備先 uncomment 下面兩行。
  # schedule:
  #   - cron: "*/15 * * * *"

concurrency:
  group: stock-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run monitor script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
          PYTHONUNBUFFERED: "1"
          # 👇 想一次過列晒所有貨嚟驗證：解除下面一行注釋
          # TEST_MODE: "1"
          # 👇 想 debug Toys'R'Us 結構：解除下面一行注釋
          # DEBUG_TRU: "1"
        run: python Github_HBL_Toys_beyblade_telegram.py

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_products.json seen_toysrus.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "state 冇變化,唔使 commit"
          else
            git commit -m "chore: update state [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "push 衝突,重試 $i ..."
              sleep 5
            done
          fi
